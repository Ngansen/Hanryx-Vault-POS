# =============================================================================
#  HanryxVault — DHCP Static Reservations
#  Copy entries into /etc/dnsmasq.d/hanryx-lan.conf on the relevant Pi
#  Format: dhcp-host=<MAC>,<hostname>,<fixed-IP>
# =============================================================================

# ── Main Pi LAN (192.168.10.x) ───────────────────────────────────────────────
# Netgear R6020 (LAN port, AP mode)
# dhcp-host=aa:bb:cc:dd:ee:ff,netgear-r6020,192.168.10.11

# Satellite Pi eth0
# dhcp-host=aa:bb:cc:dd:ee:01,satellite-pi,192.168.10.10

# Zettle card reader (if wired)
# dhcp-host=aa:bb:cc:dd:ee:02,zettle-reader,192.168.10.20

# Desktop / till monitor
# dhcp-host=aa:bb:cc:dd:ee:03,till-desktop,192.168.10.30


# ── Satellite Pi LAN (192.168.11.x) ──────────────────────────────────────────
# Example device on satellite network
# dhcp-host=aa:bb:cc:dd:ee:10,sat-device,192.168.11.10


# =============================================================================
#  How to find a MAC address
#  On Linux / Pi:   ip link show eth0
#  On Windows:      ipconfig /all
#  On Android:      Settings → About phone → Status → Wi-Fi MAC
# =============================================================================
