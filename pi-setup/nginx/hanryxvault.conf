# HanryxVault POS — nginx reverse proxy
# Performance-tuned for Raspberry Pi 5

# Upstream to gunicorn — keepalive pool avoids reconnecting every request
upstream hanryxvault_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name hanryxvault.tailcfc0a3.ts.net _;

    client_max_body_size 50M;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Scan queue endpoint — tablet polls every 1.5 s, keep fast ─────────────
    location /scan {
        proxy_pass         http://hanryxvault_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;

        # No cache — real-time scans must not be stale
        add_header Cache-Control "no-store";
    }

    # ── Inventory — tablet syncs this, allow short browser cache ──────────────
    location /inventory {
        proxy_pass         http://hanryxvault_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Zettle OAuth — must be fast and HTTPS ─────────────────────────────────
    location /zettle/ {
        proxy_pass         http://hanryxvault_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── APK download — large file, generous timeout ───────────────────────────
    location /download/ {
        proxy_pass         http://hanryxvault_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_read_timeout 120s;
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      8 256k;
    }

    # ── Everything else ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://hanryxvault_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
