# ═══════════════════════════════════════════════════════════════════════════════
#  HanryxVault Pi — nginx multi-service config
#  Services:
#    storefront  (HanRyx-Vault public website)  → port 3000
#    pos         (Flask POS + admin dashboard)  → port 8080
#
#  Routing strategy:
#    • PUBLIC_DOMAIN (e.g. hanryxvault.duckdns.org) → storefront
#    • TAILSCALE_HOST (e.g. hanryxvault.tailcfc0a3.ts.net) → POS
#    • catch-all / direct LAN IP → POS (for Android tablet on LAN)
#
#  Setup steps (run on the Pi):
#    1. Edit the two server_name lines below with your actual hostnames.
#    2. sudo cp nginx/hanryxvault.conf /etc/nginx/sites-available/hanryxvault
#    3. sudo ln -sf /etc/nginx/sites-available/hanryxvault \
#                   /etc/nginx/sites-enabled/hanryxvault
#    4. sudo rm -f /etc/nginx/sites-enabled/default
#    5. sudo nginx -t && sudo systemctl reload nginx
#    6. (HTTPS) sudo certbot --nginx -d hanryxvault.duckdns.org
# ═══════════════════════════════════════════════════════════════════════════════

# ── Upstreams ──────────────────────────────────────────────────────────────────
upstream storefront_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream pos_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

# ── WebSocket upgrade map ──────────────────────────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ══════════════════════════════════════════════════════════════════════════════
#  1. PUBLIC STOREFRONT — hanryxvault.duckdns.org (or your custom domain)
#     Replace the server_name value with your actual public hostname.
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name hanryxvault.duckdns.org;   # ← EDIT: your public domain

    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Static assets — long cache ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass         http://storefront_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://storefront_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        add_header         Cache-Control "no-store";
    }

    # ── WebSocket (live storefront updates) ───────────────────────────────────
    location /ws {
        proxy_pass         http://storefront_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Everything else ───────────────────────────────────────────────────────
    location / {
        proxy_pass         http://storefront_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # certbot will insert its ACME challenge block here
}

# ══════════════════════════════════════════════════════════════════════════════
#  2. POS ADMIN + TABLET API — Tailscale hostname + LAN catch-all
#     Replace the first server_name value with your Tailscale machine name.
#     '_' means any direct LAN IP access also lands here — so the Android
#     tablet can reach the POS on the local network without any DNS config.
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name hanryxvault.tailcfc0a3.ts.net _;   # ← EDIT: your Tailscale hostname

    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml text/javascript image/svg+xml;

    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Scan queue — tablet polls every 1.5 s ────────────────────────────────
    location /scan {
        proxy_pass         http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
        add_header         Cache-Control "no-store";
    }

    # ── SSE scan stream — long-lived, disable buffering ──────────────────────
    location /scan/stream {
        proxy_pass         http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        add_header         X-Accel-Buffering "no";
        add_header         Cache-Control "no-store";
    }

    # ── Inventory sync ────────────────────────────────────────────────────────
    location /inventory {
        proxy_pass         http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Zettle OAuth callback ─────────────────────────────────────────────────
    location /zettle/ {
        proxy_pass         http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── APK download ──────────────────────────────────────────────────────────
    location /download/ {
        proxy_pass         http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_read_timeout 120s;
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      8 256k;
    }

    # ── Admin dashboard + all other POS routes ────────────────────────────────
    location / {
        proxy_pass         http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
