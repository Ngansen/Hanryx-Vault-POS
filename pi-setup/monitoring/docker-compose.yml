# pi-setup/monitoring/docker-compose.yml
#
# Prometheus + Grafana + node_exporter for the main Pi.
# Scrapes both Pis (main + kiosk at 192.168.86.22) every 15 s and
# renders dashboards in Grafana. Grafana is exposed via NPM at
# https://hanryxvault.tailcfc0a3.ts.net/grafana/, Prometheus has its
# own direct port for ad-hoc PromQL queries (admin tool, not user-facing).
#
# Bring up (after the proxy stack is up and the network exists):
#   cd ~/Hanryx-Vault-POS/pi-setup/monitoring
#   sudo chown -R 65534:65534 prometheus-data       # nobody:nobody — prometheus
#   sudo chown -R 472:472     grafana-data          # grafana:grafana
#   docker compose up -d
#
# See pi-setup/REMOTE_ACCESS.md for the full walkthrough including
# node_exporter install on the kiosk Pi and Grafana dashboard import.

services:
  prometheus:
    # Pinned tag + multi-arch manifest digest. See pi-setup/docs/REPRODUCIBILITY.md
    # for the bump procedure (mirrors the digest-pin policy of the main compose).
    image: prom/prometheus:v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    container_name: prometheus
    restart: unless-stopped
    ports:
      # Bound on all interfaces — same as node-exporter (:9100) and grafana
      # (:3001). Previously bound to the Tailscale IP only, but Docker tries
      # the bind at container-start time, before tailscaled has assigned the
      # interface address on a cold boot, so the bind silently failed and
      # Prometheus became unreachable from any host shell. 0.0.0.0 makes the
      # bind survive any boot order. Access stays gated by the home WiFi /
      # tailnet membership the same way the POS on :8080 already is.
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus
    extra_hosts:
      # So the in-container Prometheus can scrape the host's
      # node_exporter at host.docker.internal:9100
      - "host.docker.internal:host-gateway"
    networks: [hanryx_net]

  grafana:
    # Pinned tag + multi-arch manifest digest. See pi-setup/docs/REPRODUCIBILITY.md
    # for the bump procedure.
    image: grafana/grafana:13.1.0-25469333600-ubuntu@sha256:602d4df46b5ccc6d3cbd779f7094abdb256fcd21d855d30d8d98d984fe9bf6bb
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:3001/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # Anonymous read-only access — required so the 7" diagnostics-screen
      # kiosk can show the dashboard without prompting for a login. The
      # admin login form still works for editing from the laptop. Tailnet
      # membership is what gates external access; anonymous here only
      # means "anyone reaching Grafana can read", which is fine inside
      # the tailnet.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Admin password is set declaratively from pi-setup/.env so a fresh
      # install is never reachable with the well-known admin/admin combo.
      # Required: anyone on the tailnet can read dashboards (anonymous Viewer
      # above), but only the holder of GRAFANA_ADMIN_PASSWORD can edit them
      # or add data sources. Rotate by editing the .env value and running
      # `docker compose up -d --force-recreate grafana`.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required (set in pi-setup/.env)}
    networks: [hanryx_net]
    depends_on: [prometheus]

  node-exporter:
    # Pinned tag + multi-arch manifest digest. See pi-setup/docs/REPRODUCIBILITY.md
    # for the bump procedure.
    image: prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node-exporter
    restart: unless-stopped
    # Host networking so node_exporter sees the real /proc and /sys
    # of the Pi (not the container's view). Listens on host:9100.
    # The host's firewall (or lack of it) plus tailnet membership
    # is what gates external access.
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # rslave propagates host mount events (e.g. UGreen dock at /mnt/cards
      # mounted after this container started) into the container's rootfs
      # view so node_exporter can report node_filesystem_* for them.
      # Without this, /mnt/cards shows "No data" in Grafana even when the
      # host clearly has the dock mounted.
      - /:/rootfs:ro,rslave
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      # Excludes pseudo-filesystems from the disk metrics so the
      # "Disk usage" panels don't show a misleading 100 entries
      # for things like /sys, /proc, container overlays, /mnt/host etc.
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

networks:
  hanryx_net:
    external: true
    # Same shared network as ../proxy/docker-compose.yml
    # Created once with: docker network create hanryx_net
