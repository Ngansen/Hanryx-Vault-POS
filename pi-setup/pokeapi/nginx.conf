server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html/data;

    # CORS for browser fetches (POS UI calls this directly when offline)
    add_header Access-Control-Allow-Origin  *           always;
    add_header Access-Control-Allow-Methods "GET,OPTIONS" always;
    add_header Access-Control-Allow-Headers "*"          always;

    # Long cache — this dataset is essentially static
    add_header Cache-Control "public, max-age=86400" always;

    # PokeAPI URL convention is "/api/v2/<resource>/<id>/" with a trailing slash;
    # the static dump stores each as "<resource>/<id>/index.json".  try_files
    # makes both styles resolve.
    location /api/v2/ {
        try_files $uri $uri/index.json $uri.json =404;
        default_type application/json;
    }

    # Healthcheck used by docker-compose
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Status page so humans can see whether data is loaded yet
    location = / {
        default_type text/plain;
        return 200 "HanRyx-Vault offline PokeAPI\n\nTry: /api/v2/pokemon/1/\n     /api/v2/type/fire/\n     /healthz\n";
    }
}
