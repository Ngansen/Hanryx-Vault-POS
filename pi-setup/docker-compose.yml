services:

  # ── PostgreSQL — shared database server ───────────────────────────────────────
  # Two databases are created automatically on first start:
  #   vaultpos   — Flask POS server (inventory, sales, scan queue, etc.)
  #   storefront — HanRyx-Vault public storefront (products, orders, users)
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       vaultpos
      POSTGRES_USER:     vaultpos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vaultpos}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultpos -d vaultpos"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis — cross-worker pub/sub (SSE) + shared L2 cache ─────────────────────
  # Scan events published here so all gunicorn workers see them instantly.
  # Also used as a shared TTL cache in front of PostgreSQL.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PgBouncer — connection pooler ────────────────────────────────────────────
  # Sits between Flask and PostgreSQL in transaction-pooling mode.
  # Keeps PostgreSQL connection count low (Pi 5 RAM-friendly) while Flask can
  # open as many short-lived client connections as it needs.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgres://vaultpos:${DB_PASSWORD:-vaultpos}@db:5432/vaultpos
      POOL_MODE:         transaction
      MAX_CLIENT_CONN:   200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE:     5
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      LOG_CONNECTIONS:   "0"
      LOG_DISCONNECTIONS: "0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || true"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask POS server ──────────────────────────────────────────────────────────
  # Handles: tablet POS, admin dashboard, scan queue, Zettle, BT receipt printer
  # Accessible: LAN (port 8080) + Tailscale VPN hostname
  # Android app should connect to http://<pi-ip>:8080 (LAN) or via WireGuard
  pos:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"   # LAN + VPN accessible — Android APK connects here directly
    environment:
      DATABASE_URL:     postgresql://vaultpos:${DB_PASSWORD:-vaultpos}@pgbouncer:5432/vaultpos
      REDIS_URL:        redis://redis:6379/0
      FLASK_ENV:        production
      PYTHONUNBUFFERED: "1"

      SESSION_SECRET:   ${SESSION_SECRET:-change-me-on-the-pi}
      ADMIN_PASSWORD:   ${ADMIN_PASSWORD:-hanryxvault}

      # Pull inventory from the local storefront (internal Docker network)
      CLOUD_INVENTORY_SOURCES: http://storefront:3000/api/products

      # Satellite Pi auth token — REQUIRED if you use a satellite trade-show Pi
      # Generate with: openssl rand -hex 32
      # Also register the same value in satellite.conf on the trade-show Pi.
      # SATELLITE_TOKEN: your-secret-token

      # Zettle OAuth
      # ZETTLE_CLIENT_ID:     your-client-id
      # ZETTLE_CLIENT_SECRET: your-client-secret

      # Pokémon TCG API key (free = 1k/day; with key = 20k/day)
      # PTCG_API_KEY: your-api-key

      # OpenAI — card photo identification via GPT-4o Vision
      # Get a key at https://platform.openai.com/api-keys
      # OPENAI_API_KEY: sk-...

      # Gmail SMTP for sale alerts
      # SMTP_USER:         you@gmail.com
      # SMTP_APP_PASSWORD: xxxx-xxxx-xxxx-xxxx
      # NOTIFY_EMAIL:      alerts@example.com
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy

  # ── HanRyx-Vault storefront ───────────────────────────────────────────────────
  # Public-facing React + Express customer website with PayPal checkout.
  # nginx routes the public domain to this service on port 3000.
  # Cloned from https://github.com/Ngansen/HanRyx-Vault at build time.
  storefront:
    build: ./services/storefront
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # nginx proxies the public domain here
    environment:
      DATABASE_URL: postgresql://vaultpos:${DB_PASSWORD:-vaultpos}@db:5432/storefront
      PORT:         "3000"
      NODE_ENV:     production

      SESSION_SECRET: ${SESSION_SECRET:-change-me-on-the-pi}

      # The storefront pushes inventory updates to the POS (internal Docker network)
      # Set this so the storefront notifies the POS when you add/update products.
      HANRYX_POS_PUSH_URL: http://pos:8080/push/inventory

      # PayPal credentials for the checkout flow
      # PAYPAL_CLIENT_ID:     your-paypal-client-id
      # PAYPAL_CLIENT_SECRET: your-paypal-client-secret

      # Pokémon TCG API key (shared with POS)
      # PTCG_API_KEY: your-api-key
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
