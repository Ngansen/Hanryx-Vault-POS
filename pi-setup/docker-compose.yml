services:

  # ── PostgreSQL — shared database server ───────────────────────────────────────
  # Two databases are created automatically on first start:
  #   vaultpos   — Flask POS server (inventory, sales, scan queue, etc.)
  #   storefront — HanRyx-Vault public storefront (products, orders, users)
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    command: ["postgres", "-c", "password_encryption=md5"]
    environment:
      POSTGRES_DB:       vaultpos
      POSTGRES_USER:     vaultpos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vaultpos}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultpos -d vaultpos"]
      interval: 5s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis — cross-worker pub/sub (SSE) + shared L2 cache ─────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── PgBouncer — connection pooler ────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASE_URL:      postgres://vaultpos:${DB_PASSWORD:-vaultpos}@db:5432/vaultpos
      POOL_MODE:         transaction
      MAX_CLIENT_CONN:   200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE:     5
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: DISCARD ALL
      LOG_CONNECTIONS:   "0"
      LOG_DISCONNECTIONS: "0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || true"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Flask POS server ──────────────────────────────────────────────────────────
  # Handles: tablet POS (proxied via satellite Pi), admin dashboard, scan queue
  # Network: Main Pi (home) ← Tailscale ← Satellite Pi (shop) ← LAN ← Tablet
  # Accessible on Tailscale as 'hanryxvault' at port 8080
  pos:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL:     postgresql://vaultpos:${DB_PASSWORD:-vaultpos}@db:5432/vaultpos
      REDIS_URL:        redis://redis:6379/0
      FLASK_ENV:        production
      PYTHONUNBUFFERED: "1"

      SESSION_SECRET:   ${SESSION_SECRET:-change-me-on-the-pi}
      ADMIN_PASSWORD:   ${ADMIN_PASSWORD:-hanryxvault}

      # GitHub token — used for inventory sync from Ngansen/Inventory-Scanner repo
      GITHUB_TOKEN:     ${GITHUB_TOKEN:-}

      # PSA Public API — cert authentication on PSA slabs.
      # Free token from https://www.psacard.com/publicapi
      PSA_API_TOKEN:    ${PSA_API_TOKEN:-}

      # tcgpricelookup.com — secondary reference price source on Market screen.
      # Free tier is 200 req/day; only fired on explicit operator "Compare" clicks.
      TCGPL_API_KEY:    ${TCGPL_API_KEY:-}

      # Disable background prewarm threads.  These walk the inventory and call
      # eBay continuously to pre-cache prices, which exhausts the 5000/day
      # Finding API quota in hours and breaks live sold-listings lookups.
      # Keep "1" (disabled) — pricing is cached on demand when you actually
      # search a card in the UI.  Set to "0" only if you have a higher quota.
      DISABLE_BG_PRICING_PREWARM: "1"
      DISABLE_BG_LANG_PREWARM:    "1"
      DISABLE_BG_PRICE_REFRESH:   "1"

      # Storefront cloud sync — remove if you don't run the storefront service
      CLOUD_INVENTORY_SOURCES: ${CLOUD_INVENTORY_SOURCES:-}

      # Inventory-Scanner live API (fastest sync — set to your deployed scanner URL)
      # INVENTORY_SCANNER_URL: https://your-scanner.replit.app/api/inventory

      # GitHub inventory repo (fallback if INVENTORY_SCANNER_URL not set)
      GITHUB_INVENTORY_REPO:   ${GITHUB_INVENTORY_REPO:-Ngansen/Inventory-Scanner}
      GITHUB_INVENTORY_BRANCH: ${GITHUB_INVENTORY_BRANCH:-main}

      # Idle-screen kiosk video directory (matches the volume mount below).
      KIOSK_VIDEOS_DIR: /app/kiosk-videos

      # eBay Finding API credentials (sold listings, 30/90-day price history).
      # Set EBAY_APP_ID / EBAY_CERT_ID in pi-setup/.env on the host.
      EBAY_APP_ID:  ${EBAY_APP_ID:-}
      EBAY_CERT_ID: ${EBAY_CERT_ID:-}

      # pokemontcg.io API key (for the TCGplayer-price proxy in
      # tcgplayer_proxy.py). Optional — works without one, but a key bumps
      # the rate limit from 1k/day to 20k/day. Get one free at dev.pokemontcg.io.
      POKEMONTCG_API_KEY: ${POKEMONTCG_API_KEY:-}

      # Self-hosted offline PokeAPI mirror (see pokeapi/ service below).
      # The Flask server prefers this URL and only falls back to pokeapi.co
      # if the local mirror is unreachable.
      POKEAPI_BASE_URL: ${POKEAPI_BASE_URL:-http://pokeapi/api/v2}

      # Pokémon-card-recognizer service (separate container, see below).
      RECOGNIZER_BASE_URL: ${RECOGNIZER_BASE_URL:-http://recognizer:8081}

      # ── Receipt printer (MUNBYN P047 / any ESC/POS thermal) ───────────────
      # Ethernet path (preferred): set PRINTER_NETWORK_HOST in pi-setup/.env
      # to the printer's static LAN IP. Default port 9100 (RAW/JetDirect).
      # USB path is auto-detected via the device mount below — leave unset
      # if you're using USB only.
      PRINTER_NETWORK_HOST: ${PRINTER_NETWORK_HOST:-}
      PRINTER_NETWORK_PORT: ${PRINTER_NETWORK_PORT:-9100}

      # Folder where PokeScraper_3.0 CSVs are dropped (bind-mounted below).
      JPN_DATA_DIR: /app/data/jp_pokellector

      # SATELLITE_TOKEN: your-secret-token
      # ZETTLE_CLIENT_ID:     your-client-id
      # ZETTLE_CLIENT_SECRET: your-client-secret
      # PTCG_API_KEY: your-api-key
      # OPENAI_API_KEY: sk-...
      # SMTP_USER:         you@gmail.com
      # SMTP_APP_PASSWORD: xxxx-xxxx-xxxx-xxxx
      # NOTIFY_EMAIL:      alerts@example.com
    volumes:
      - pos-data:/data
      - card-images:/app/card-images
      # Idle-screen video playlist (downloaded by hanryxvault-kiosk-videos.timer
      # on the host into /opt/hanryxvault/kiosk/videos/).  Read-only inside the
      # container; Flask serves them via /kiosk/videos/<file>.
      - /opt/hanryxvault/kiosk/videos:/app/kiosk-videos:ro
      # PokeScraper_3.0 CSV drop folder (read-only).  See data/jp_pokellector/README.md.
      - ./data/jp_pokellector:/app/data/jp_pokellector:ro
    # ── USB receipt printer passthrough (MUNBYN P047, etc.) ────────────────
    # If you connect the printer via USB (instead of Ethernet), keep the lines
    # below uncommented AND make sure the printer is plugged in BEFORE running
    # `docker compose up` — Docker fails to start if the device file is
    # missing on the host. For Ethernet printers, comment them out and set
    # PRINTER_NETWORK_HOST in pi-setup/.env instead.
    devices:
      - "/dev/usb/lp0:/dev/usb/lp0"
    # The /dev/usb/lp0 device is owned by root:lp on the host. The container
    # runs as the unprivileged 'hanryx' user, so we add gid 7 (lp on Debian /
    # Raspberry Pi OS) so the user can open the device for writing receipts.
    group_add:
      - "7"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 2g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ── Pokémon-card recognizer (video / image ML inference) ─────────────────────
  # Wraps prateekt/pokemon-card-recognizer in a small Flask service.  Heavy
  # dependencies (torch, easyocr, opencv, ffmpeg) are isolated here so they
  # don't bloat the POS container.  On a Pi 5 (CPU-only) inference is slow
  # but workable for one-off binder scans / booster opening videos.
  #
  # Build is large (~3 GB) and slow first time — torch + easyocr download a
  # lot of wheels.  After the build completes, container starts in ~30 s.
  recognizer:
    build: ./recognizer
    restart: unless-stopped
    environment:
      PORT: "8081"
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    mem_limit: 3g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Offline PokeAPI mirror ────────────────────────────────────────────────────
  # nginx serving the static JSON dump from PokeAPI/api-data.  On first start
  # the init script clones the dataset (~240 MB) into the volume; subsequent
  # starts are instant.  The Flask POS server reads POKEAPI_BASE_URL and prefers
  # this URL over the public pokeapi.co API so the POS keeps working when the
  # shop's internet drops.
  pokeapi:
    build: ./pokeapi
    restart: unless-stopped
    volumes:
      - pokeapi-data:/usr/share/nginx/html
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── HanRyx-Vault storefront ───────────────────────────────────────────────────
  storefront:
    build:
      context: ./services/storefront
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://vaultpos:${DB_PASSWORD:-vaultpos}@db:5432/storefront
      PORT:         "3000"
      NODE_ENV:     production

      SESSION_SECRET: ${SESSION_SECRET:-change-me-on-the-pi}

      HANRYX_POS_PUSH_URL: http://pos:8080/push/inventory

      # PAYPAL_CLIENT_ID:     your-paypal-client-id
      # PAYPAL_CLIENT_SECRET: your-paypal-client-secret
      # PTCG_API_KEY: your-api-key
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  pos-data:
  card-images:
  pokeapi-data:
