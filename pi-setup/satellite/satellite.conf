# ═══════════════════════════════════════════════════════════════════════════════
#  HanryxVault — Trade Show (Satellite) Pi Configuration
#  Read by satellite_monitor.py (persistent) and satellite_sync.py (manual).
#  Edit this file any time — the monitor picks up changes on its next restart.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Home Pi connection ────────────────────────────────────────────────────────
# WireGuard VPN (recommended — works from any internet connection):
#   home_pi_url=http://100.125.5.34:8080
#
# Tailscale (alternative — works anywhere without manual VPN setup):
#   home_pi_url=http://hanryxvault.tailcfc0a3.ts.net
#
# LAN only (only works on the same home network):
#   home_pi_url=http://192.168.1.50:8080
#
home_pi_url=http://100.125.5.34:8080

# ── Shared authentication token ───────────────────────────────────────────────
# Generated by setup-satellite.sh and registered on the home Pi.
# Leave blank for open (unauthenticated) mode — only safe on a private VPN.
# This file is chmod 600 when set by the installer.
satellite_token=

# ── WireGuard VPN ─────────────────────────────────────────────────────────────
# WireGuard interface name (wg0 unless you changed it)
vpn_interface=wg0

# Seconds to wait for VPN tunnel to establish on boot before first check
vpn_wait_s=8

# ── Connectivity + sync behaviour ─────────────────────────────────────────────
# How often to check if the home Pi is reachable (seconds).
# Lower = detects reconnects faster. 30s is a good balance.
poll_interval_s=30

# Seconds to wait for the home Pi to respond before marking as unreachable
timeout_s=15

# While ONLINE: if there is still pending data, re-sync after this many seconds.
# Catches any records that were created after the last sync but before going offline.
online_sync_interval_s=300

# While OFFLINE: log the pending sale count this often so you can monitor it.
offline_log_interval_s=300

# Retries before giving up on a push/pull step, and delay between attempts
retry_count=3
retry_delay_s=4

# ── Market pricing sync ───────────────────────────────────────────────────────
# After pushing sales to /sync/sales, also send a lightweight sale summary
# to /sales (no auth required) so the home Pi's market pricing database
# includes trade show prices. Recommended: true.
push_sale_summary=true

# ── Expo app scan hub notification ───────────────────────────────────────────
# After a successful sync, the satellite can post a notification to your Expo
# app's scan hub so the Expo app knows to refresh its inventory/data.
#
# Set to the scan hub URL of the HOME Pi (not the satellite):
#   expo_notify_url=http://10.10.0.1:8765/scan
#
# Enable the notification:
#   expo_notify_on_sync=true
#
expo_notify_url=
expo_notify_on_sync=false

# ── Home Pi endpoints reference ───────────────────────────────────────────────
# These endpoints exist on the home Pi and are used automatically.
# You do not need to configure them — listed here for reference only.
#
#   POST /sync/sales           ← full transaction push (satellite_token required)
#   POST /inventory/deduct     ← stock deduction     (satellite_token required)
#   POST /inventory/decrement  ← quick stock deduction for APK (no auth, simpler payload)
#   GET  /inventory            ← pull full catalogue (open)
#   POST /sales                ← sale summary for market pricing (open)
#   GET  /sales                ← query sale history (open, ?limit=N&name=...)
#   POST /zettle/pay           ← trigger Zettle card payment (home Pi Zettle only)
#   GET  /zettle/login         ← Zettle OAuth redirect (home Pi Zettle only)
#   GET  /admin/monitor-stats  ← all KPIs in one JSON call
#   GET  /health               ← reachability check
