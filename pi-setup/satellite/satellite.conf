# ═══════════════════════════════════════════════════════════════════════════════
#  HanryxVault — Trade Show (Satellite) Pi Configuration
#  This file is read by satellite_sync.py on every boot.
#  Edit it any time — changes take effect on the next boot (or manual sync).
# ═══════════════════════════════════════════════════════════════════════════════

# ── Home Pi connection ────────────────────────────────────────────────────────
# WireGuard VPN (recommended — works from any internet connection):
#   home_pi_url=http://10.10.0.1:8080
#
# Tailscale (alternative — also works anywhere, no manual VPN setup):
#   home_pi_url=http://hanryxvault.tailcfc0a3.ts.net
#
# LAN only (only works on same home network):
#   home_pi_url=http://192.168.1.50:8080
#
home_pi_url=http://10.10.0.1:8080

# ── WireGuard VPN settings ────────────────────────────────────────────────────
# Name of the WireGuard interface (wg0 unless you changed it)
vpn_interface=wg0

# How many seconds to wait for the VPN tunnel to finish establishing after boot
# before making the first sync attempt. Increase if sync often fails on first boot.
vpn_wait_s=8

# ── Sync behaviour ────────────────────────────────────────────────────────────
# Seconds to wait for home Pi to respond before giving up
timeout_s=20

# How many times to retry a failed push/pull step
retry_count=2
