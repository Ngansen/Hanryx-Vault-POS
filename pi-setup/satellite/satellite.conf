# ═══════════════════════════════════════════════════════════════════════════════
#  HanryxVault — Trade Show (Satellite) Pi Configuration
#  Edit this file before running setup-satellite.sh
# ═══════════════════════════════════════════════════════════════════════════════

# URL of your HOME Pi.
# Via WireGuard VPN:  use the WireGuard peer IP  (e.g. http://10.10.0.1:8080)
# Via Tailscale:      use the Tailscale domain    (e.g. http://hanryxvault.tailcfc0a3.ts.net)
# On same LAN:        use the local IP            (e.g. http://192.168.1.50:8080)
#
home_pi_url=http://10.10.0.1:8080

# Seconds to wait before giving up on a connection attempt
timeout_s=15

# How many times to retry a failed push/pull before marking it as an error
retry_count=2
